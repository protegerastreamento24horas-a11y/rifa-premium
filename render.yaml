# Render.com Blueprint para Rifa Premium
# Use este arquivo para fazer deploy automatizado no Render
# NOTA: As propriedades válidas do Render são: connectionString, host, hostport, port

services:
  # Banco de dados MySQL (criar primeiro para obter connectionString)
  - type: pserv
    name: rifa-premium-db
    runtime: docker
    plan: standard
    branch: master
    dockerfilePath: ./Dockerfile.mysql
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
      - key: MYSQL_USER
        value: rifa_user
      - key: MYSQL_PASSWORD
        generateValue: true
      - key: MYSQL_DATABASE
        value: rifa_premium
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10

  # Serviço Web (PHP + Apache)
  - type: web
    name: rifa-premium
    runtime: docker
    plan: standard
    branch: master
    dockerfilePath: ./Dockerfile
    envVars:
      - key: RENDER_EXTERNAL_HOSTNAME
        value: ${RENDER_EXTERNAL_HOSTNAME}
      - key: DB_CONNECTION_STRING
        fromService:
          name: rifa-premium-db
          type: pserv
          property: connectionString
      - key: DB_SERVER
        fromService:
          name: rifa-premium-db
          type: pserv
          property: host
      - key: DB_PORT
        fromService:
          name: rifa-premium-db
          type: pserv
          property: port
      # Variáveis fixas para MySQL (o connectionString já contém user/pass)
      - key: DB_USERNAME
        value: rifa_user
      - key: DB_PASSWORD
        value: rifa_pass123
      - key: DB_NAME
        value: rifa_premium
    healthCheckPath: /health.php
    autoDeploy: true
