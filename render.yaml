# Render.com Blueprint para Rifa Premium - APENAS WEB SERVICE
# 
# IMPORTANTE: Crie o banco de dados MySQL manualmente antes:
# 1. Dashboard Render → New → MySQL
# 2. Anote: hostname, port, user, password, database
# 3. Configure as variáveis de ambiente abaixo
#
# Propriedades válidas do Render Blueprint: connectionString, host, hostport, port
# NOTA: connectionString só funciona com serviços de banco nativos (não pserv)

services:
  # Serviço Web (PHP + Apache + IonCube)
  - type: web
    name: rifa-premium
    runtime: docker
    plan: standard
    branch: master
    dockerfilePath: ./Dockerfile
    envVars:
      # URL da aplicação (gerada automaticamente pelo Render)
      - key: BASE_URL
        value: https://${RENDER_EXTERNAL_HOSTNAME}/
      
      # Configuração do Banco de Dados
      # PREENCHA MANUALMENTE após criar o MySQL no Render:
      - key: DB_SERVER
        sync: false  # Configure manualmente no dashboard
      - key: DB_PORT
        value: "3306"
      - key: DB_USERNAME
        sync: false  # Configure manualmente no dashboard
      - key: DB_PASSWORD
        sync: false  # Configure manualmente no dashboard
      - key: DB_NAME
        sync: false  # Configure manualmente no dashboard
    
    healthCheckPath: /health.php
    autoDeploy: true
